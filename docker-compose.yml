services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: barkain-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: barkain
      POSTGRES_USER: app
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d barkain"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres-test:
    image: timescale/timescaledb:latest-pg16
    container_name: barkain-db-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: barkain_test
      POSTGRES_USER: app
      POSTGRES_PASSWORD: test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d barkain_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: barkain-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── LocalStack (SQS emulation for background workers, Step 2h) ──
  # Only the `sqs` service is enabled. Workers point at this via
  # SQS_ENDPOINT_URL=http://localhost:4566 in dev; leave SQS_ENDPOINT_URL
  # empty in prod so boto3 resolves real AWS SQS via IAM / default chain.
  localstack:
    image: localstack/localstack:3
    container_name: barkain-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
      EAGER_SERVICE_LOADING: "1"
      DEBUG: "0"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Scraper Containers (uncomment when retailer scripts are built) ──
  # Each retailer runs in its own container with Chromium + agent-browser.
  # Port mapping: amazon=8081, best_buy=8082, walmart=8083, target=8084,
  #   home_depot=8085, lowes=8086, ebay_new=8087, ebay_used=8088,
  #   sams_club=8089, backmarket=8090, fb_marketplace=8091
  #
  # walmart-scraper:
  #   build:
  #     context: ./containers/walmart
  #     dockerfile: Dockerfile
  #   container_name: barkain-scraper-walmart
  #   ports:
  #     - "8083:8080"
  #   environment:
  #     RETAILER_ID: walmart
  #     SCRIPT_VERSION: "0.1.0"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2G
  #         cpus: "1.0"

volumes:
  pgdata:
  localstack-data:
