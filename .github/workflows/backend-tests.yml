name: Backend Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'containers/**'
      - '.github/workflows/backend-tests.yml'
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test
          POSTGRES_DB: barkain_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U app -d barkain_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-test.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        working-directory: backend
        env:
          # NOTE: DEMO_MODE is deliberately NOT set. The `client` fixture
          # stubs auth via app.dependency_overrides; `unauthed_client` relies on
          # the real get_current_user to 401 on missing Authorization header.
          # Setting DEMO_MODE=1 would short-circuit both paths and break
          # auth tests. Real API keys aren't needed — Gemini/Anthropic/Clerk calls
          # are mocked at the service boundary in every unit test.
          # (Renamed from BARKAIN_DEMO_MODE in Step 2i-b.)
          TEST_DATABASE_URL: postgresql+asyncpg://app:test@localhost:5433/barkain_test
          DATABASE_URL: postgresql+asyncpg://app:test@localhost:5433/barkain_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          GEMINI_API_KEY: test-key-not-real
          ANTHROPIC_API_KEY: test-key-not-real
          CLERK_SECRET_KEY: test-key-not-real
          CLERK_PUBLISHABLE_KEY: test-key-not-real
          UPCITEMDB_API_KEY: ""
          FIRECRAWL_API_KEY: ""
        run: |
          python -m pytest --tb=short -q
